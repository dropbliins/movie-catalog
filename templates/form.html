{% extends "base.html" %}

{% block content %}
<h1 class="h3 mb-4">{{ title }}</h1>

<form method="post" class="bg-white p-4 rounded shadow-sm" style="max-width: 600px;">

    <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control" maxlength="300"
               value="{{ film.title if film else '' }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Director</label>
        <input type="text" name="director" class="form-control" maxlength="200"
               value="{{ film.director if film else '' }}" required>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Year</label>
            <input type="number" name="year" class="form-control" min="1888" max="2030"
                   value="{{ film.year if film else '' }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Rating (0–10)</label>
            <input type="number" name="rating" step="0.1" min="0" max="10" class="form-control"
                   value="{{ film.rating if film else '' }}" required>
            <div class="form-text">A number from 0 to 10, e.g. 8.5</div>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Cover image URL</label>
        <input type="url" name="cover" class="form-control" maxlength="500"
               value="{{ film.cover if film else '' }}" placeholder="https://...">
    </div>

    <div class="mb-3">
        <label class="form-label">Overview</label>
        <textarea name="overview" class="form-control" rows="4">{{ film.overview if film else '' }}</textarea>
    </div>

    <button type="submit" class="btn btn-success">💾 Save</button>
    <a href="{{ url_for('films.home') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
