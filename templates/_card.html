<div class="col">
    <div class="card h-100 shadow-sm">
        <a href="{{ url_for('films.film_detail', film_id=film.id) }}">
            <img src="{{ film.cover }}" class="card-img-top" alt="{{ film.title }}"
                 loading="lazy" style="aspect-ratio: 2/3; object-fit: cover;">
        </a>
        <div class="card-body p-2">
            <h6 class="card-title mb-1 text-truncate" title="{{ film.title }}">
                <a href="{{ url_for('films.film_detail', film_id=film.id) }}"
                   class="text-decoration-none text-dark">{{ film.title }}</a>
            </h6>
            <div class="d-flex justify-content-between align-items-center">
                <small class="text-muted">{{ film.year }}</small>
                <span class="badge bg-warning text-dark">⭐ {{ film.rating }}</span>
            </div>

            {% if current_user.is_authenticated %}
            <form action="{{ url_for('favorites.toggle_favorite', film_id=film.id) }}" method="post" class="d-grid mt-2">
                <button class="btn btn-sm {{ 'btn-danger' if film in current_user.favorites else 'btn-outline-danger' }}">
                    {{ '❤️ Favorited' if film in current_user.favorites else '🤍 Favorite' }}
                </button>
            </form>
            {% endif %}
        </div>
    </div>
</div>
